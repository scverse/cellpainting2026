baseURL = "https://scverse.github.io/cellpainting2026/"
languageCode = "en-us"
title = "scverse x cellpainting"

# ─── Event identity ──────────────────────────────────────────────────────────
[params]
  eventName     = "scverse x cellpainting 2026"
  eventSeries   = "Unifying Omics Hackathon Series"
  eventTagline  = "Bridging scverse and Cell Painting communities at the intersection of image-based profiling, phenomics, and single-cell perturbation analysis."
  eventDates    = "September 2 - 4, 2026"
  eventStart    = "2026-09-02"  # ISO date — used for calendar links
  eventEnd      = "2026-09-04"
  eventLocation = "Berlin, Germany"
  venueName     = "Max Delbrück Center (MDC), Campus Berlin-Buch"
  applicationDeadline = "May 24, 2026 (AOE)"
  acceptanceNotification = "June 8, 2026 (AOE)"
  venueMapURL   = "https://maps.app.goo.gl/DJiAjCKN7TkDTU1u5"  # Google Maps / OpenStreetMap URL for "Get directions"
  heroImage     = ""
  heroVideo     = ""            # Set to a .mp4 path to use video instead of image
  heroSwirl     = "/img/hero/swirl.png"  # Decorative swirl overlay in the hero

  calendarURL   = ""            # Google Calendar / .ics URL
  githubRepo    = "https://github.com/scverse/cellpainting2026"
  contactEmail  = "cellpainting2026@scverse.org"
  zulipChannel  = "https://scverse.zulipchat.com/#narrow/channel/591503-2026-09.3A-hackathon-cellpainting"
  linkedinURL   = "https://www.linkedin.com/company/scverse/"

  # Primary call-to-action button in the hero. Set enabled = false to hide all
  # "Apply to join" buttons (e.g. once applications close).
  [params.cta]
    enabled = true
    label = "Apply to join"
    url   = "https://luma.com/acc1jjuq"

# ─── Per-event colour palette ────────────────────────────────────────────────
# Only change these — everything else (grey scale, typography) is locked to the
# scverse brand identity and should not be modified.
  [params.theme]
    accent        = "#6aaa2a"   # buttons, links, active states
    accentDark    = "#2d5a1b"   # hover states
    gradientStart = "#5abfb7"   # hero title gradient — left/top
    gradientEnd   = "#c8e832"   # hero title gradient — right/bottom
    highlight     = "#b8d400"   # badges, chips, accent lines

# ─── Suggested palette presets (copy one block to [params.theme] above) ──────
# Cell Painting / orange: accent="#e5864b" accentDark="#b85d2a" gradientStart="#262fb5" gradientEnd="#e5864b" highlight="#fbb822"
# Spatial / teal:      accent="#40a9ff" accentDark="#0080dd" gradientStart="#262fb5" gradientEnd="#40a9ff" highlight="#6cf1a1"
# Single-cell / pink:  accent="#de367b" accentDark="#a01d55" gradientStart="#262fb5" gradientEnd="#de367b" highlight="#969dea"

[markup.goldmark.renderer]
  unsafe = true
